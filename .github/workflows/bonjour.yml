# name      : nom affiché dans l'onglet Actions
# on        : événement(s) qui déclenchent le workflow
# jobs      : ensemble des jobs à exécuter
# runs-on   : type de machine virtuelle utilisée (runner)
# steps     : liste ordonnée des étapes du job
# run       : commande shell à exécuter dans l'étape

name: Workflow d'initiation

on:
  push:

jobs:
  saluer-le-monde:
    runs-on: ubuntu-latest
    steps:
      - name: Dire bonjour
        run: echo "Bonjour depuis GitHub Actions !"

      - name: Afficher la date du jour
        run: date

      - name: Afficher l'acteur du déclenchement
        run: echo "Déclenché par ${{ github.actor }}"
